name: CI Pipeline

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ─────────────────────────────────────────────
  # Backend Linting & Testing
  # ─────────────────────────────────────────────
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install flake8 black
      - name: Run flake8
        run: cd backend && flake8 app/ --max-line-length=120 --exclude=__pycache__ --extend-ignore=E203
      - name: Check black formatting
        run: cd backend && black --check --line-length=120 app/

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: backend-lint
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: propvision_test
          POSTGRES_USER: propvision
          POSTGRES_PASSWORD: test_secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U propvision -d propvision_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx
      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://propvision:test_secret@localhost:5432/propvision_test
          REDIS_URL: redis://localhost:6379/0
          OPENAI_API_KEY: test-key
          APP_ENV: testing
        run: cd backend && pytest tests/ -v --tb=short

  # ─────────────────────────────────────────────
  # Frontend Linting & Type Checking
  # ─────────────────────────────────────────────
  frontend-lint:
    name: Frontend Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: ESLint
        run: cd frontend && npx eslint src/
      - name: TypeScript type check
        run: cd frontend && npx tsc --noEmit

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: frontend-lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Build production bundle
        run: cd frontend && npm run build

  # ─────────────────────────────────────────────
  # Deploy to Production (on push to main only)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Lightsail
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ks2dckmd134
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            cd /opt/prop-vision-ai
            git pull origin main
            docker-compose pull
            docker-compose up -d --build
            docker-compose exec -T api alembic upgrade head
            echo "Deployment complete at $(date)"
