upstream api_backend {
    server api:58000;
}

upstream frontend_app {
    server frontend:53000;
}

server {
    listen 80;
    server_name propvision.ai www.propvision.ai;

    # Redirect HTTP to HTTPS (enable after SSL is configured)
    # return 301 https://$host$request_uri;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # API routes
    location /api/ {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for long-running requests (3D reconstruction, AI search)
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # Allow large file uploads (photos for 3D reconstruction)
        client_max_body_size 150M;
    }

    # Widget script
    location /widget.js {
        proxy_pass http://frontend_app;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin "*";
        add_header Cache-Control "public, max-age=3600";
    }

    # Frontend routes
    location / {
        proxy_pass http://frontend_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (for Vite HMR in development)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Static asset caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|glb|gltf)$ {
        proxy_pass http://frontend_app;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Health check for load balancers
    location /health {
        proxy_pass http://api_backend/api/v1/health;
    }
}
